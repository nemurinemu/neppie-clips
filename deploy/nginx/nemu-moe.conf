# nemu.moe — static "under construction" page.
# copy to sites-available, then:
#   ln -s /etc/nginx/sites-available/nemu-moe.conf /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
# HTTPS: certbot --nginx -d nemu.moe

server {
    listen 80;
    listen [::]:80;
    server_name nemu.moe;

    root /var/www/nemu-moe;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
