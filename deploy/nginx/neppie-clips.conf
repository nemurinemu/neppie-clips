# neppie-clips — copy to /etc/nginx/sites-available/, edit the three __PLACEHOLDERS__,
# then: ln -s /etc/nginx/sites-available/neppie-clips.conf /etc/nginx/sites-enabled/ && nginx -t && systemctl reload nginx
# For HTTPS, run `certbot --nginx -d __DOMAIN__` afterwards; it rewrites this block.

server {
    listen 80;
    listen [::]:80;
    server_name __DOMAIN__;

    root __WEB_ROOT__;
    index index.html;

    # allow large video responses to stream without buffering to disk
    client_max_body_size 0;

    # SPA — fall back to index.html for client-side routes
    location / {
        try_files $uri $uri/ /index.html;
    }

    # API → Node (pm2), PORT from apps/api/.env.production
    location /api/ {
        proxy_pass http://127.0.0.1:3200;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Media served straight from disk (__CLIPS_DIR__ = CLIPS_DIR from the .env files)
    location /media/videos/ {
        alias __CLIPS_DIR__/videos/;
        access_log off;
        expires 7d;
    }
    location /media/thumbnails/ {
        alias __CLIPS_DIR__/thumbnails/;
        access_log off;
        expires 30d;
    }
}
